<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento • Cedro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900">
    <div class="max-w-2xl mx-auto px-6 py-16">
        <h1 class="text-4xl font-semibold tracking-tight">Solicitar Orçamento</h1>
        <p class="mt-4 text-slate-600">Preencha o formulário abaixo para receber seu orçamento personalizado.</p>
        
        <form class="mt-8 space-y-5">
            <input type="text" placeholder="Nome completo" class="w-full border p-3 rounded-xl">
            <input type="email" placeholder="E-mail" class="w-full border p-3 rounded-xl">
            <input type="tel" placeholder="Telefone / WhatsApp" class="w-full border p-3 rounded-xl">
            <textarea placeholder="Descreva o que precisa" class="w-full border p-3 rounded-xl h-32"></textarea>
            <button type="submit" class="w-full bg-[#1a3c34] text-white py-4 rounded-3xl font-semibold">Enviar Pedido de Orçamento</button>
        </form>
    </div>
</body>
</html>
